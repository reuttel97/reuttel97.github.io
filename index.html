<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding Abfahrten</title>

<style>
body {
  background: black;
  color: orange;
  font-family: monospace;
  font-size: 24px;
}

.line {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}
  @keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}

  .blink {
  animation: blink 3s infinite;
}
</style>
</head>

<body>

<h1>S+U Wedding</h1>
<div id="board"></div>

<script>
async function load() {
  const res = await fetch(
    "https://v6.bvg.transport.rest/stops/900009104/departures?duration=10")

 const json = await res.json()
 const data = json.departures || json
 console.log(data)
  const board = document.getElementById("board")

  board.innerHTML = ""

  data.forEach((dep, index) => {

  if (!dep.line.name.startsWith("U")) return;

  const time = dep.when || dep.plannedWhen
  if (!time) return;

  const minutes = Math.max(0, Math.round(
    (new Date(time) - new Date()) / 60000
  ))

  const delay = dep.delay ? Math.round(dep.delay / 60) : 0

  const isFirst = true

  const div = document.createElement("div")
  div.className = "line"

  const left = document.createElement("span")
  left.textContent = dep.line.name + " → " + dep.direction

  const right = document.createElement("span")

  if (dep.cancelled) {
    right.textContent = "Fällt aus"

  } else if (isFirst && minutes === 0) {
    right.textContent = ""
    left.classList.add("blink")

  } else if (delay > 0) {
    right.textContent = minutes + " min (+" + delay + ")"

  } else {
    right.textContent = minutes + " min"
  }

  div.appendChild(left)
  div.appendChild(right)

  board.appendChild(div)

})
}

load()
setInterval(load, 30000)
</script>

</body>
</html>
